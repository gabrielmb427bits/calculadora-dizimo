

<!DOCTYPE html>
<!-- Declaração do tipo de documento HTML5 -->
<html lang="pt-BR"> <!--ELEMENTO e ATRIBUTO-->
<!-- Início do documento HTML com idioma definido como português do Brasil -->


<head>
    <meta charset="UTF-8">
    <!-- Define a codificação de caracteres como UTF-8 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Configura o viewport para garantir que o site seja responsivo em dispositivos móveis -->
    <title>Calculadora de Dízimo</title>
    <link rel="stylesheet" href="style.css">
    <!-- Define o título da página, que aparece na aba do navegador -->
</head>

<>

  <div class="container"> <h1>Calculadora de Dízimo</h1>

    <p class="versiculo">"Trazei todos os dízimos à casa do tesouro..." <br> <strong>Malaquias 3:10</strong></p>

    <p>Digite o montante:</p>
    <input type="number" id="montante" placeholder="Montante">
    <button onclick="calcularDizimo()">Calcular Dízimo</button>
    <p id="resultado"></p>

  </div> <script>
    // ... seu código javascript continua aqui ...
    function calcularDizimo() {
    // 1. Pegamos o valor e trocamos a vírgula por ponto para o sistema entender
    let valorDigitado = document.getElementById('montante').value.replace(',', '.');
    
    // 2. Convertemos para número
    let montante = parseFloat(valorDigitado);

    // 3. Verificamos se é um número válido
    if (isNaN(montante) || montante <= 0) {
        document.getElementById('resultado').innerText = "Por favor, digite um valor válido.";
        return;
    }

    // 4. Cálculo exato dos 10%
    let dizimo = montante * 0.10;

    // 5. Formatação para Real Brasileiro (R$ 0,00)
    let valorFormatado = dizimo.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

    // 6. Exibimos o resultado
    document.getElementById('resultado').innerText = 'O dízimo é: ' + valorFormatado + '\nDeus abençoe!';
}
  </script>
</body>
</html>
</script>
</html>
